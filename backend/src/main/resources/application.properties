spring.application.name=quizsphere-backend
server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/quizsphere?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${JWT_SECRET:VGhpcy1pcy1hLWRlbW8tc2VjcmV0LWtleS10aGF0LW11c3QtYmUtYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

spring.jackson.serialization.write-dates-as-timestamps=false

# Resend HTTPS API / password reset OTP
app.resend.api-key=${RESEND_API_KEY:}
app.resend.from=${RESEND_FROM:QuizSphere <onboarding@resend.dev>}
app.resend.reply-to=${RESEND_REPLY_TO:}

app.password-reset.otp-expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.password-reset.reset-token-expiry-minutes=${RESET_TOKEN_EXPIRY_MINUTES:10}
app.password-reset.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
app.password-reset.max-attempts=${OTP_MAX_ATTEMPTS:5}


# Google Identity Services
app.google.client-id=${GOOGLE_CLIENT_ID:}
