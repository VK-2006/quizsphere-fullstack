services:
  mysql:
    image: mysql:8.4
    container_name: quizsphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: quizsphere
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - quizsphere_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: quizsphere-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/quizsphere?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: VGhpcy1pcy1hLWxvbmctZGVtby1zZWNyZXQta2V5LWZvci1xdWl6c3BoZXJlLWRvY2tlcg==
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_APP_PASSWORD: ${MAIL_APP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  quizsphere_mysql_data:
